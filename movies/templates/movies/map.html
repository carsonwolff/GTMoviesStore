{% extends 'base.html' %}
{% block content %}
<div class="p-3">
    <div class="container">
        <div class="row mt-3">
            <div class="col mx-auto mb-3">
                <h2>Local Popularity Map</h2>
                <p>Discover which movies are trending in different geographic areas based on recent purchases.</p>
                <hr />
            </div>
        </div>
        
        <div class="row m-1">
            <!-- Map Container -->
            <div id="popularity-map" style="height: 600px; width: 100%; border-radius: 8px; border: 1px solid #ccc;"></div>
        </div>
    </div>
</div>

<!-- Include Leaflet CSS and JS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Initialize the map, centered on a default location (e.g., center of US)
        var map = L.map('popularity-map').setView([39.8283, -98.5795], 4);

        // Add OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Fetch trending data from our API
        fetch('{% url "movies.trending_api" %}')
            .then(response => response.json())
            .then(data => {
                if (data.locations && data.locations.length > 0) {
                    var bounds = [];
                    data.locations.forEach(loc => {
                        // Create a marker for each location
                        var marker = L.marker([loc.lat, loc.lng]).addTo(map);
                        
                        // Add a popup with the trending movie info
                        marker.bindPopup(
                            "<b>Trending Movie:</b> " + loc.trending_movie + "<br>" +
                            "<b>Purchases:</b> " + loc.purchase_count
                        );
                        
                        bounds.push([loc.lat, loc.lng]);
                    });
                    
                    // Fit map to markers if we have any
                    if (bounds.length > 0) {
                        map.fitBounds(bounds);
                    }
                } else {
                    console.log("No trending data found.");
                }
            })
            .catch(error => console.error('Error fetching map data:', error));
    });
</script>
{% endblock content %}
